name: Project-3 SAM Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup SAM CLI
      uses: aws-actions/setup-sam@v2

    - name: Create S3 Bucket if Not Exists
      run: |
        aws s3 mb s3://sam-deploy-462096274659-us-east-1 \
          --region us-east-1 || true

    - name: Delete Existing SQS Queues
      run: |
        QUEUES=$(aws sqs list-queues --region us-east-1 --query "QueueUrls[]" --output text)
        for url in $QUEUES; do
          echo "Deleting queue: $url"
          aws sqs delete-queue --queue-url "$url" --region us-east-1 || true
        done
        echo "Waiting 60 seconds for SQS cooldown..."
        sleep 60

    - name: Delete Existing Stack if Failed
      run: |
        STATUS=$(aws cloudformation describe-stacks \
          --stack-name project-3-order-management \
          --region us-east-1 \
          --query "Stacks[0].StackStatus" \
          --output text 2>/dev/null || echo "DOES_NOT_EXIST")
        echo "Stack status: $STATUS"
        if [[ "$STATUS" == "ROLLBACK_COMPLETE" || "$STATUS" == "CREATE_FAILED" ]]; then
          echo "Deleting failed stack..."
          aws cloudformation delete-stack \
            --stack-name project-3-order-management \
            --region us-east-1
          aws cloudformation wait stack-delete-complete \
            --stack-name project-3-order-management \
            --region us-east-1
        fi

    - name: SAM Build
      run: sam build

    - name: SAM Deploy
      run: |
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --parameter-overrides \
            Environment=dev \
            VpcId=${{ secrets.VPC_ID }} \
            PrivateSubnet1Id=${{ secrets.PRIVATE_SUBNET_1 }} \
            PrivateSubnet2Id=${{ secrets.PRIVATE_SUBNET_2 }}

    - name: Print Stack Outputs
      run: |
        aws cloudformation describe-stacks \
          --stack-name project-3-order-management \
          --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
          --region us-east-1 \
          --output table