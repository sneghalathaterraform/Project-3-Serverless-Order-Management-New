AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Serverless Event-Driven Order Processing System - AWS SAM Template'

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs22.x
    Environment:
      Variables:
        ORDERS_TABLE: !Ref OrdersTable
        QUEUE_URL: !Ref OrderQueue
        SNS_TOPIC_ARN: !Ref OrderNotificationTopic
        S3_BUCKET: !Ref ImageBucket

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment (dev or prod)

  # ===== EXISTING VPC RESOURCES (already created in console) =====
  VpcId:
    Type: String
    Default: vpc-0ab2b78a4704c2008
    Description: Existing Project-3-VPC-Endpoint VPC ID

  PrivateSubnet1Id:
    Type: String
    Default: subnet-014abbdadb03267e2
    Description: Private-subnet-1-Project-3 (us-east-1c)

  PrivateSubnet2Id:
    Type: String
    Default: subnet-08b52d934219ebe4b
    Description: Private-subent-2-Project-3 (us-east-1b)

Resources:

  # ==================== DynamoDB TABLE ====================
  OrdersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${Environment}-orders'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIdIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== S3 BUCKETS ====================
  LoggingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${AWS::AccountId}-order-logs-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        LogFilePrefix: self-logs/
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt LoggingBucket.Arn
              - !Sub '${LoggingBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  ImageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${AWS::AccountId}-order-images-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: image-bucket-logs/
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            ExposedHeaders: []
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ImageBucket.Arn
              - !Sub '${ImageBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${AWS::AccountId}-order-app-frontend-${Environment}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: frontend-bucket-logs/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== SNS TOPIC ====================
  OrderNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${Environment}-order-notifications'
      DisplayName: Order Notification Topic
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== SQS QUEUES ====================
  OrderQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: !Sub '${Environment}-order-processing-queue'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OrderDLQ.Arn
        maxReceiveCount: 3

  OrderDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: !Sub '${Environment}-order-processing-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  # ==================== VPC SECURITY GROUP ====================
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions inside VPC
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound to VPC endpoints
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 10.0.0.0/16
          Description: Allow all traffic within VPC for DynamoDB and SQS
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-lambda-sg'
        - Key: Environment
          Value: !Ref Environment

  # ==================== IAM ROLES & POLICIES ====================
  LambdaPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${Environment}-lambda-execution-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DynamoDBAccess
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt OrdersTable.Arn
          - Sid: DynamoDBIndexAccess
            Effect: Allow
            Action:
              - dynamodb:Query
            Resource: !Sub '${OrdersTable.Arn}/index/*'
          - Sid: S3ObjectAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub '${ImageBucket.Arn}/*'
          - Sid: S3BucketAccess
            Effect: Allow
            Action:
              - s3:GetBucketLocation
            Resource: !GetAtt ImageBucket.Arn
          - Sid: SNSAccess
            Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref OrderNotificationTopic
          - Sid: SQSAccess
            Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource:
              - !GetAtt OrderQueue.Arn
              - !GetAtt OrderDLQ.Arn
          - Sid: SESAccess
            Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: '*'
          - Sid: VPCAccess
            Effect: Allow
            Action:
              - ec2:CreateNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:DeleteNetworkInterface
              - ec2:AssignPrivateIpAddresses
              - ec2:UnassignPrivateIpAddresses
            Resource: '*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref LambdaPolicy

  # ==================== API GATEWAY ====================
  ServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      TracingEnabled: true

  # ==================== LAMBDA FUNCTIONS ====================

  # 1. API HANDLER LAMBDA
  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Environment}-api-handler'
      CodeUri: src/lambdas/api-handler/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /orders
            Method: POST
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /orders/{orderId}
            Method: GET
        ListOrders:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /orders
            Method: GET
        GetPresignedUrl:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /upload-url
            Method: POST

  # 2. WORKER LAMBDA (triggered by SQS, runs inside VPC)
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Environment}-order-worker'
      CodeUri: src/lambdas/worker/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # 3. NOTIFIER LAMBDA (triggered by SNS, sends email via SES)
  NotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Environment}-order-notifier'
      CodeUri: src/lambdas/notifier/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Events:
        SNSEvent:
          Type: SNS
          Properties:
            Topic: !Ref OrderNotificationTopic

  # ==================== CLOUDFRONT DISTRIBUTION ====================
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for order app frontend

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFront
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub '${FrontendBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultRootObject: index.html
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
          - Id: ApiOrigin
            DomainName: !Sub '${ServerlessApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          - PathPattern: !Sub '/${Environment}/*'
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: none
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${Environment}-ApiEndpoint'

  CloudFrontURL:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${Environment}-CloudFrontURL'

  OrdersTableName:
    Description: DynamoDB Orders Table Name
    Value: !Ref OrdersTable
    Export:
      Name: !Sub '${Environment}-OrdersTable'

  ImageBucketName:
    Description: S3 Image Bucket Name
    Value: !Ref ImageBucket
    Export:
      Name: !Sub '${Environment}-ImageBucket'

  OrderQueueUrl:
    Description: SQS Queue URL
    Value: !Ref OrderQueue
    Export:
      Name: !Sub '${Environment}-OrderQueue'

  SNSTopicArn:
    Description: SNS Topic ARN
    Value: !Ref OrderNotificationTopic
    Export:
      Name: !Sub '${Environment}-SNSTopic'

  VpcIdOutput:
    Description: VPC used by Lambda functions
    Value: !Ref VpcId
    Export:
      Name: !Sub '${Environment}-VpcId'

  LambdaSecurityGroupId:
    Description: Security Group for Lambda functions in VPC
    Value: !GetAtt LambdaSecurityGroup.GroupId
    Export:
      Name: !Sub '${Environment}-LambdaSecurityGroup'

  ApiHandlerFunctionArn:
    Description: API Handler Lambda Function ARN
    Value: !GetAtt ApiHandlerFunction.Arn
    Export:
      Name: !Sub '${Environment}-ApiHandlerFunctionArn'

  WorkerFunctionArn:
    Description: Worker Lambda Function ARN
    Value: !GetAtt WorkerFunction.Arn
    Export:
      Name: !Sub '${Environment}-WorkerFunctionArn'

  NotifierFunctionArn:
    Description: Notifier Lambda Function ARN
    Value: !GetAtt NotifierFunction.Arn
    Export:
      Name: !Sub '${Environment}-NotifierFunctionArn'
